# Deploys to staging automatically when code is merged into dev.
# Vercel and Render pick up the deploy via their GitHub integrations —
# this workflow just triggers them and posts a Slack/notification if needed.

name: Deploy — Staging

on:
  push:
    branches: [dev]

jobs:
  deploy-api-staging:
    name: Deploy API to Render (staging)
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST "${{ secrets.RENDER_STAGING_DEPLOY_HOOK }}"

  # Vercel deploys the frontend automatically on push to dev via its GitHub integration.
  # No extra step needed — Vercel preview URLs are posted to the PR automatically.
  notify:
    name: Staging deployed
    runs-on: ubuntu-latest
    needs: [deploy-api-staging]
    steps:
      - name: Log deploy
        run: echo "Staging deploy triggered for commit ${{ github.sha }}"
